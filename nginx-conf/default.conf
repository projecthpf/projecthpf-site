server {
    listen 80;
    server_name projecthpf.org www.projecthpf.org _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Redirect /members to members subdomain
    location ~* ^/members(/.*)?$ {
        return 301 https://members.projecthpf.org$1;
    }

    # Backward-compat: old Liquid Democracy URLs → new Liberate Democracy slug
    location = /liquiddemocracy       { return 301 /liberatedemocracy; }
    location = /liquiddemocracy.html  { return 301 /liberatedemocracy; }
    location = /liquiddemocracy/      { return 301 /liberatedemocracy; }

    # Serve static files directly
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache CSS/JS with revalidation (so ?v= busting works)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache images/fonts aggressively
    location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache videos
    location ~* \.(mp4|webm|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Don't cache HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Custom 404
    error_page 404 /index.html;
}
